# golden_data.yaml
# -----------------
# LegacyLens — RAG System for Legacy Enterprise Codebases — Evaluation benchmark
# -------------------------------------------------------------------------------
# 20 golden Q&A pairs used to measure retrieval precision and answer quality.
#
# expected_chunks for ll-001 through ll-006 (mandatory anchors) have been populated
# with real file paths and paragraph names verified against data/gnucobol-contrib.
# ll-003 (CALCULATE-INTEREST) is intentionally empty — no interest calculation
# exists in this repo; the test validates the system does not hallucinate.
#
# Categories:
#   happy_path     — standard queries any working RAG system should handle
#   structural     — division/section-level navigation
#   dependency     — CALL/COPY/USING cross-file reasoning
#   edge_case      — dead code, missing copybooks, ambiguous input
#   business_logic — extraction of embedded business rules
#
# Difficulty levels:
#   easy   — single-file, single-paragraph answer
#   medium — requires context from 2-3 chunks or cross-section reasoning
#   hard   — requires cross-file dependency chain or DATA DIVISION cross-reference

test_cases:

  # ── Happy Path (mandatory anchors, ll-001 through ll-006) ──────────────────

  - id: "ll-001"
    category: "happy_path"
    query: "Where is the main entry point of this program?"
    expected_chunks:
      - file_path: "data/gnucobol-contrib/samples/games/star_trek/ctrek.cob"
        paragraph_name: ""
    must_contain:
      - "file path"
      - "line number"
      - "paragraph"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "hallucinated"
    difficulty: "easy"

  - id: "ll-002"
    category: "happy_path"
    query: "What functions modify the CUSTOMER-RECORD?"
    expected_chunks:
      - file_path: "data/gnucobol-contrib/samples/HTML-CGI-GnuCOBOL/cust01.cbl"
        paragraph_name: "UPDATE-RECORD"
      - file_path: "data/gnucobol-contrib/samples/HTML-CGI-GnuCOBOL/cust01.cbl"
        paragraph_name: "ADD-RECORD"
    must_contain:
      - "CUSTOMER-RECORD"
      - "paragraph"
      - "line number"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
    difficulty: "medium"

  - id: "ll-003"
    category: "happy_path"
    query: "Explain what the CALCULATE-INTEREST paragraph does"
    expected_chunks: []
    must_contain:
      - "not found"
    must_not_contain:
      - "I cannot help"
      - "interest rate"
      - "calculates"
      - "file path"
      - "line number"
    difficulty: "easy"

  - id: "ll-004"
    category: "happy_path"
    query: "Find all file I/O operations"
    expected_chunks:
      - file_path: "data/gnucobol-contrib/tools/JC-SQL-Precompiler/presql2.cbl"
        paragraph_name: ""
    must_contain:
      - "OPEN"
      - "READ"
      - "WRITE"
      - "file"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
    difficulty: "medium"

  - id: "ll-005"
    category: "happy_path"
    query: "What are the dependencies of MODULE-X?"
    expected_chunks:
      - file_path: "data/gnucobol-contrib/samples/DBsample/PostgreSQL/example1/PGMOD1.cbl"
        paragraph_name: ""
    must_contain:
      - "CALL"
      - "dependency"
      - "module"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
    difficulty: "medium"

  - id: "ll-006"
    category: "happy_path"
    query: "Show me error handling patterns in this codebase"
