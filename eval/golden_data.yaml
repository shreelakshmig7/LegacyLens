# golden_data.yaml
# -----------------
# LegacyLens — RAG System for Legacy Enterprise Codebases — Evaluation benchmark
# -------------------------------------------------------------------------------
# 20 golden Q&A pairs used to measure retrieval precision and answer quality.
#
# expected_chunks for ll-001 through ll-006 (mandatory anchors) have been populated
# with real file paths and paragraph names verified against data/gnucobol-contrib.
# ll-003 (CALCULATE-INTEREST) is intentionally empty — no interest calculation
# exists in this repo; the test validates the system does not hallucinate.
# Remaining TBDs (ll-007 onward) will be filled in as the retrieval layer matures.
#
# Categories:
#   happy_path     — standard queries any working RAG system should handle
#   structural     — division/section-level navigation
#   dependency     — CALL/COPY/USING cross-file reasoning
#   edge_case      — dead code, missing copybooks, ambiguous input
#   business_logic — extraction of embedded business rules
#
# Difficulty levels:
#   easy   — single-file, single-paragraph answer
#   medium — requires context from 2-3 chunks or cross-section reasoning
#   hard   — requires cross-file dependency chain or DATA DIVISION cross-reference
#
# Author: Shreelakshmi Gopinatha Rao
# Project: LegacyLens — RAG System for Legacy Enterprise Codebases

test_cases:

  # ── Happy Path (mandatory anchors, ll-001 through ll-006) ──────────────────

  - id: "ll-001"
    category: "happy_path"
    query: "Where is the main entry point of this program?"
    expected_chunks:
      - file_path: "data/gnucobol-contrib/samples/DBsample/PostgreSQL/example1/PGMOD1.cbl"
        paragraph_name: "MAIN-PGMOD1"
    must_contain:
      - "file path"
      - "line number"
      - "paragraph"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
      - "hallucinated"
    difficulty: "easy"

  - id: "ll-002"
    category: "happy_path"
    query: "What functions modify the CUSTOMER-RECORD?"
    expected_chunks:
      - file_path: "data/gnucobol-contrib/samples/HTML-CGI-GnuCOBOL/cust01.cbl"
        paragraph_name: "UPDATE-RECORD"
      - file_path: "data/gnucobol-contrib/samples/HTML-CGI-GnuCOBOL/cust01.cbl"
        paragraph_name: "ADD-RECORD"
    must_contain:
      - "CUSTOMER-RECORD"
      - "paragraph"
      - "line number"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "medium"

  - id: "ll-003"
    category: "happy_path"
    # Note: gnucobol-contrib contains no CALCULATE-INTEREST paragraph (no financial
    # programs in this repo). This test validates that the system does NOT hallucinate.
    # The correct answer must explicitly say the paragraph was not found.
    # expected_chunks is empty; must_contain forces an explicit "not found" response;
    # must_not_contain prevents the system from fabricating paragraph content.
    query: "Explain what the CALCULATE-INTEREST paragraph does"
    expected_chunks: []
    must_contain:
      - "not found"
    must_not_contain:
      - "I cannot help"
      - "CALCULATE-INTEREST"
      - "interest rate"
      - "calculates"
    difficulty: "easy"

  - id: "ll-004"
    category: "happy_path"
    query: "Find all file I/O operations"
    expected_chunks:
      - file_path: "data/gnucobol-contrib/samples/HTML-CGI-GnuCOBOL/cust01.cbl"
        paragraph_name: "INQUIRE-PARA"
      - file_path: "data/gnucobol-contrib/tools/changeformat/changeformat-f.cbl"
        paragraph_name: "CHECK-INPUT-FILE"
    must_contain:
      - "OPEN"
      - "READ"
      - "WRITE"
      - "file"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "medium"

  - id: "ll-005"
    category: "happy_path"
    query: "What are the dependencies of MODULE-X?"
    expected_chunks:
      - file_path: "data/gnucobol-contrib/samples/DBsample/PostgreSQL/example1/PGMOD1.cbl"
        paragraph_name: "COPY-SQL-MSG-IN-LINKAGE"
    must_contain:
      - "CALL"
      - "dependency"
      - "module"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "medium"

  - id: "ll-006"
    category: "happy_path"
    query: "Show me error handling patterns in this codebase"
    expected_chunks:
      - file_path: "data/gnucobol-contrib/samples/worldcities/worldcities5.cbl"
        paragraph_name: "SQL-ERROR"
      - file_path: "data/gnucobol-contrib/samples/HTML-CGI-GnuCOBOL/cust01.cbl"
        paragraph_name: "UPDATE-RECORD"
    must_contain:
      - "error"
      - "paragraph"
      - "line number"
    must_not_contain:
      - "I cannot help"
      - "hallucinated"
    difficulty: "medium"

  # ── Structural queries (ll-007 through ll-010) ─────────────────────────────

  - id: "ll-007"
    category: "structural"
    query: "What sections are defined in the PROCEDURE DIVISION?"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD — PROCEDURE DIVISION header"
    must_contain:
      - "PROCEDURE DIVISION"
      - "section"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "easy"

  - id: "ll-008"
    category: "structural"
    query: "What variables are declared in the WORKING-STORAGE SECTION?"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD — WORKING-STORAGE SECTION"
    must_contain:
      - "WORKING-STORAGE"
      - "variable"
      - "line number"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "easy"

  - id: "ll-009"
    category: "structural"
    query: "How is the FILE SECTION structured in the DATA DIVISION?"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD — FILE SECTION"
    must_contain:
      - "FILE SECTION"
      - "DATA DIVISION"
      - "FD"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "easy"

  - id: "ll-010"
    category: "structural"
    query: "List all paragraph names in the main program file"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD"
    must_contain:
      - "paragraph"
      - "line number"
      - "file path"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "medium"

  # ── Dependency queries (ll-011 through ll-014) ─────────────────────────────

  - id: "ll-011"
    category: "dependency"
    query: "Which programs does this codebase CALL externally?"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD"
    must_contain:
      - "CALL"
      - "program"
      - "line number"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "medium"

  - id: "ll-012"
    category: "dependency"
    query: "What copybooks are included via COPY statements?"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD"
    must_contain:
      - "COPY"
      - "copybook"
      - "line number"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "easy"

  - id: "ll-013"
    category: "dependency"
    query: "Which paragraphs pass parameters using USING clauses?"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD"
    must_contain:
      - "USING"
      - "parameter"
      - "line number"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "medium"

  - id: "ll-014"
    category: "dependency"
    query: "Trace the full call chain starting from the main entry point"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD"
    must_contain:
      - "CALL"
      - "entry"
      - "chain"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "hard"

  # ── Edge cases (ll-015 through ll-018) ─────────────────────────────────────

  - id: "ll-015"
    category: "edge_case"
    query: "Are there any dead code sections that are never called?"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD"
    must_contain:
      - "paragraph"
      - "line number"
    must_not_contain:
      - "I cannot help"
      - "error"
    difficulty: "hard"

  - id: "ll-016"
    category: "edge_case"
    query: "What happens when the input file is missing?"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD"
    must_contain:
      - "file"
      - "line number"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "hard"

  - id: "ll-017"
    category: "edge_case"
    query: "Show me variables defined in copybooks that are used in the main program"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD"
    must_contain:
      - "copybook"
      - "variable"
      - "COPY"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "hard"

  - id: "ll-018"
    category: "edge_case"
    query: "xyzzy gibberish paragraph does not exist"
    expected_chunks: []
    must_contain:
      - "not found"
    must_not_contain:
      - "xyzzy"
      - "hallucinated"
    difficulty: "easy"

  # ── Business logic queries (ll-019 through ll-020) ─────────────────────────

  - id: "ll-019"
    category: "business_logic"
    query: "What business rules govern the interest calculation logic?"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
        paragraph_name: "TBD — e.g. CALCULATE-INTEREST"
    must_contain:
      - "interest"
      - "rule"
      - "paragraph"
      - "line number"
    must_not_contain:
      - "I don't know"
      - "I cannot help"
      - "error"
    difficulty: "hard"

  - id: "ll-020"
    category: "business_logic"
    query: "Explain the validation rules applied to customer input data"
    expected_chunks:
      - file_path: "TBD — update in PR 2 after repo clone"
